<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fluffy">
  <title>Fluffy — El juego de Valeria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ============ RESET & BASE ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; user-select: none; -webkit-user-select: none; }

    :root {
      --cream: #FFF4E6;
      --peach: #FFD9B8;
      --coral: #FF9B85;
      --lavender: #B8A6D9;
      --mint: #88D4A0;
      --sun: #FFD98E;
      --ink: #4A3F55;
      --soft-ink: #7A6F85;
      --bg-grad: linear-gradient(160deg, #FFF4E6 0%, #FFE4D1 50%, #FFD9D9 100%);
      --display: 'Baloo 2', system-ui;
      --body: 'Atkinson Hyperlegible', system-ui;
      --shadow-soft: 0 8px 32px rgba(74, 63, 85, 0.12);
      --shadow-button: 0 4px 0 rgba(74, 63, 85, 0.15);
    }

    body {
      font-family: var(--body);
      background: var(--bg-grad);
      color: var(--ink);
      font-size: 20px;
      line-height: 1.5;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .screen.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* ============ TYPOGRAPHY ============ */
    h1, h2, h3 { font-family: var(--display); font-weight: 800; line-height: 1.1; }
    h1 { font-size: 3rem; color: var(--coral); }
    h2 { font-size: 2rem; color: var(--ink); }
    h3 { font-size: 1.5rem; color: var(--ink); }

    /* ============ BUTTONS ============ */
    .btn {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.5rem;
      padding: 20px 40px;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: var(--shadow-button);
      min-height: 64px;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(74, 63, 85, 0.15);
    }

    .btn-primary {
      background: var(--coral);
      color: white;
      font-size: 2rem;
      padding: 24px 56px;
      border-radius: 32px;
    }

    .btn-secondary { background: white; color: var(--ink); }
    .btn-syllable {
      background: white;
      color: var(--ink);
      font-size: 2.2rem;
      padding: 16px 24px;
      min-width: 80px;
      border-radius: 20px;
      margin: 8px;
      border: 3px solid var(--peach);
    }
    .btn-syllable.used {
      opacity: 0.3;
      transform: scale(0.9);
    }
    .btn-option {
      background: white;
      color: var(--ink);
      font-size: 1.3rem;
      padding: 20px 24px;
      text-align: left;
      width: 100%;
      margin: 8px 0;
      line-height: 1.4;
      min-height: auto;
    }
    .btn-option.correct { background: var(--mint); color: white; }
    .btn-option.incorrect { background: #FFB8B8; color: var(--ink); }

    /* ============ HOME SCREEN ============ */
    #screen-home {
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 24px;
    }

    .mascot-container {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mascot-container::before {
      content: '';
      position: absolute;
      bottom: 10%;
      width: 60%;
      height: 20px;
      background: radial-gradient(ellipse, rgba(74, 63, 85, 0.15), transparent 70%);
      border-radius: 50%;
    }

    .mascot-container svg {
      width: 100%;
      height: 100%;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .greeting {
      font-family: var(--display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
    }

    .greeting strong { color: var(--coral); }

    .mascot-name {
      font-family: var(--display);
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--soft-ink);
      letter-spacing: 0.02em;
    }

    .xp-bar {
      width: 260px;
      height: 16px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--coral), var(--sun));
      border-radius: 8px;
      transition: width 0.6s ease;
    }

    /* ============ SESSION SCREEN ============ */
    #screen-session {
      padding: 16px 20px;
    }

    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .session-progress {
      display: flex;
      gap: 8px;
    }

    .progress-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(74, 63, 85, 0.15);
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .progress-dot.done {
      background: var(--mint);
      transform: scale(1.1);
    }

    .progress-dot.active { background: var(--coral); }

    .mini-mascot { width: 56px; height: 56px; }

    .exercise-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 12px 0;
      min-height: 0;
    }

    /* ============ DICTADO ============ */
    .dictado-emoji {
      font-size: 8rem;
      line-height: 1;
      margin-bottom: 16px;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .sound-btn {
      background: white;
      border: none;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      font-size: 2.5rem;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      margin-bottom: 20px;
      transition: transform 0.15s ease;
    }

    .sound-btn:active { transform: scale(0.92); }

    .sound-btn.playing {
      animation: pulse 0.6s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .syllables-built {
      min-height: 80px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 16px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      width: 90%;
      max-width: 500px;
      border: 3px dashed rgba(74, 63, 85, 0.2);
    }

    .syllables-built span {
      font-family: var(--display);
      font-weight: 700;
      font-size: 2.2rem;
      color: var(--ink);
      animation: drop 0.3s ease;
    }

    @keyframes drop {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .syllables-pool {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
      gap: 4px;
    }

    /* ============ DECISIÓN LÉXICA ============ */
    .decision-word {
      font-family: var(--display);
      font-weight: 800;
      font-size: 5rem;
      color: var(--ink);
      background: white;
      padding: 40px 60px;
      border-radius: 32px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 48px;
      letter-spacing: 0.02em;
    }

    .decision-buttons {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 500px;
    }

    .decision-buttons .btn {
      flex: 1;
      font-size: 2rem;
      padding: 32px 16px;
    }

    .btn-yes { background: var(--mint); color: white; }
    .btn-no { background: var(--lavender); color: white; }

    .decision-hint {
      font-size: 1.2rem;
      color: var(--soft-ink);
      margin-bottom: 24px;
      text-align: center;
    }

    /* ============ COMPRENSIÓN ============ */
    .comprension-container {
      width: 100%;
      max-width: 700px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .comprension-text {
      background: white;
      padding: 32px 36px;
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      font-size: 1.75rem;
      line-height: 1.9;
      letter-spacing: 0.03em;
      overflow-y: auto;
      flex: 1;
      margin-bottom: 16px;
    }

    .comprension-text h3 {
      color: var(--coral);
      margin-bottom: 16px;
      font-size: 2.1rem;
    }

    .comprension-question {
      background: white;
      padding: 28px;
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
    }

    .comprension-question h3 {
      margin-bottom: 16px;
      font-size: 1.5rem;
    }

    .btn-option { font-size: 1.5rem; padding: 22px 26px; }

    /* ============ OMISIÓN DE SÍLABA ============ */
    .omision-question {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 16px;
      text-align: center;
      max-width: 560px;
      line-height: 1.6;
      background: white;
      padding: 24px 32px;
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
    }

    .omision-question strong {
      color: var(--coral);
      font-size: 1.8rem;
      display: inline-block;
      padding: 0 6px;
    }

    .omision-silabas {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
      min-height: 90px;
      align-items: center;
    }

    .omision-silabas .btn-syllable {
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .omision-silabas .btn-syllable.removed {
      opacity: 0;
      transform: translateY(-40px) scale(0.5);
      pointer-events: none;
    }

    /* ============ DISCRIMINACIÓN ============ */
    .discrim-grid {
      display: grid;
      gap: 10px;
      background: white;
      padding: 28px;
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      max-width: 90vw;
    }

    .discrim-cell {
      font-family: var(--display);
      font-weight: 800;
      font-size: 3rem;
      color: var(--ink);
      background: var(--cream);
      border: none;
      border-radius: 16px;
      padding: 12px;
      min-width: 54px;
      min-height: 54px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    .discrim-cell:active { transform: scale(0.92); }
    .discrim-cell.found { background: var(--mint); color: white; animation: pop 0.4s ease; }

    /* ============ ONBOARDING ============ */
    #screen-onboard {
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 28px;
    }

    .box-container {
      width: 240px;
      height: 240px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box-container svg { width: 100%; height: 100%; animation: float 3s ease-in-out infinite; }

    .onboard-title {
      font-family: var(--display);
      font-weight: 800;
      font-size: 2.2rem;
      color: var(--coral);
      line-height: 1.2;
    }

    .onboard-text {
      font-size: 1.3rem;
      color: var(--soft-ink);
      max-width: 380px;
      line-height: 1.5;
    }

    .name-input {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.8rem;
      text-align: center;
      padding: 18px 24px;
      border: 3px solid var(--peach);
      border-radius: 20px;
      background: white;
      color: var(--ink);
      width: 280px;
      outline: none;
    }

    .name-input:focus { border-color: var(--coral); }

    .name-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    .name-chip {
      background: white;
      border: 2px solid var(--peach);
      color: var(--ink);
      padding: 10px 20px;
      border-radius: 16px;
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .name-chip:active { background: var(--coral); color: white; }

    /* ============ FLUFFY CONTEXT (dictado) ============ */
    .fluffy-intro {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--soft-ink);
      margin-bottom: 8px;
      text-align: center;
    }
    .feedback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .feedback.show { opacity: 1; pointer-events: auto; }

    .feedback-content {
      text-align: center;
    }

    .feedback-emoji {
      font-size: 8rem;
      margin-bottom: 16px;
      animation: pop 0.5s ease;
    }

    .feedback h2 {
      color: var(--coral);
      font-size: 2.5rem;
    }

    /* ============ END SCREEN ============ */
    #screen-end {
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 24px;
    }

    .sparkles {
      position: absolute;
      pointer-events: none;
      font-size: 2rem;
      animation: sparkle 1.5s ease infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* ============ HINT / HELP ============ */
    .hint {
      font-size: 1.1rem;
      color: var(--soft-ink);
      margin-bottom: 12px;
      text-align: center;
    }

    /* ============ HUB (selección módulo) ============ */
    #screen-hub {
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
    }

    .hub-mascot { width: 180px; height: 180px; }

    .hub-title {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--ink);
    }

    .hub-title strong { color: var(--coral); }

    .hub-buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      max-width: 420px;
      margin-top: 8px;
    }

    .hub-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      background: white;
      color: var(--ink);
      padding: 22px 28px;
      border-radius: 28px;
      box-shadow: var(--shadow-button);
      border: none;
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.5rem;
      cursor: pointer;
      text-align: left;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .hub-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(74, 63, 85, 0.15);
    }

    .hub-btn-icon {
      font-size: 3rem;
      flex-shrink: 0;
      width: 70px;
      height: 70px;
      background: var(--cream);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hub-btn-letras .hub-btn-icon { background: #FFE4D1; }
    .hub-btn-numeros .hub-btn-icon { background: #E4F0FF; }

    .hub-btn-label small {
      display: block;
      font-size: 0.9rem;
      color: var(--soft-ink);
      font-weight: 400;
      margin-top: 2px;
    }

    /* ============ MÓDULO NÚMEROS ============ */
    .num-question {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.7rem;
      color: var(--ink);
      text-align: center;
      background: white;
      padding: 22px 28px;
      border-radius: 22px;
      box-shadow: var(--shadow-soft);
      max-width: 92vw;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .num-question strong { color: var(--coral); font-size: 2.2rem; }

    .num-grupos {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 92vw;
      margin-bottom: 16px;
      padding: 8px;
    }

    .num-grupo {
      background: white;
      border: 3px dashed var(--peach);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      align-items: center;
      min-width: 72px;
      min-height: 72px;
    }

    .num-item {
      font-size: 1.8rem;
      animation: pop 0.4s ease;
    }

    .num-opciones {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 92vw;
    }

    .num-opcion {
      font-family: var(--display);
      font-weight: 800;
      font-size: 2.2rem;
      background: white;
      color: var(--ink);
      border: none;
      border-radius: 20px;
      padding: 18px 26px;
      box-shadow: var(--shadow-button);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      min-width: 84px;
    }

    .num-opcion:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(74, 63, 85, 0.15);
    }

    .num-opcion.correct { background: var(--mint); color: white; }
    .num-opcion.incorrect { background: #FFB8B8; color: var(--ink); }

    .num-decenas-unidades {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .num-columna {
      background: white;
      padding: 18px 20px;
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
      text-align: center;
    }

    .num-columna-titulo {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1rem;
      color: var(--soft-ink);
      margin-bottom: 10px;
    }

    .num-fichas {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      max-width: 140px;
      min-height: 60px;
      align-items: center;
    }

    .num-ficha {
      width: 22px;
      height: 22px;
      background: var(--coral);
      border-radius: 6px;
      animation: pop 0.3s ease;
    }

    .num-ficha.decena {
      width: 14px;
      height: 50px;
      background: var(--lavender);
    }

    .num-comparacion {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .num-caja {
      background: white;
      padding: 14px;
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      align-items: center;
      min-width: 100px;
      min-height: 100px;
      max-width: 150px;
    }

    .num-caja .num-item { font-size: 1.4rem; }

    .num-comp-ops {
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }

    .num-comp-op {
      font-family: var(--display);
      font-weight: 800;
      font-size: 2.4rem;
      background: white;
      color: var(--ink);
      border: 3px solid var(--peach);
      border-radius: 18px;
      width: 72px;
      height: 72px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .num-comp-op:active { transform: scale(0.92); }
    .num-comp-op.correct { background: var(--mint); color: white; border-color: var(--mint); }
    .num-comp-op.incorrect { background: #FFB8B8; }

    /* ============ TAP FEEDBACK ============ */
    .tap-ok { animation: tapOk 0.3s ease; }
    .tap-err { animation: tapErr 0.4s ease; }

    @keyframes tapOk {
      50% { transform: scale(1.1); background: var(--mint); color: white; }
    }

    @keyframes tapErr {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); background: #FFB8B8; }
      75% { transform: translateX(8px); }
    }

    /* ============ RESPONSIVE (iPad portrait/landscape) ============ */
    @media (max-height: 800px) {
      .dictado-emoji { font-size: 6rem; }
      .decision-word { font-size: 4rem; padding: 32px 48px; }
      .mascot-container { width: 220px; height: 220px; }
    }

    @media (orientation: landscape) {
      #screen-home { flex-direction: row; justify-content: space-around; }
      .mascot-container { width: 300px; height: 300px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ONBOARDING SCREEN (primera vez) -->
  <div id="screen-onboard" class="screen">
    <div class="box-container" id="box-container"></div>

  {id:"t04",n:2,titulo:"La comida favorita de {m}",texto:"A {m} le encanta la comida. Come patata, banana y también pan. Pero su comida favorita es el pepino fresco. Cuando ve un pepino, {m} salta y mueve la cola. Papá le da un trocito pequeño y {m} lo come muy feliz. Luego pide más con la pata.",pregunta:"¿Cuál es la comida favorita de {m}?",opciones:["La banana","El pepino fresco","La patata"],correcta:1},
  {id:"t05",n:3,titulo:"{m} va al parque",texto:"Hoy vamos al parque con {m}. Lleva un balón rojo y está muy contento. Hay mucho sol en el cielo. {m} corre por el jardín y salta por todo el campo. Ve un árbol grande y se pone debajo a descansar. Toma agua fresca y vuelve a jugar con su balón favorito.",pregunta:"¿Qué se lleva {m} al parque?",opciones:["Un balón rojo","Una pelota azul","Un juguete roto"],correcta:0},
  {id:"t06",n:3,titulo:"{m} hace un amigo",texto:"En el parque, {m} ve a otro perro pequeño. Tiene el pelo gris y los ojos muy dulces. Los dos se huelen despacio y mueven la cola. ¡Son amigos! Juegan juntos y corren por todo el campo. Al final del día {m} está cansado pero muy contento. Ha hecho un amigo nuevo.",pregunta:"¿Cómo es el perro nuevo?",opciones:["Muy grande y marrón","Pequeño y con pelo gris","Alto y con pelo negro"],correcta:1},
  {id:"t07",n:3,titulo:"{m} y el balón perdido",texto:"{m} tiene un balón que le encanta mucho. Un día, el balón sale rodando muy lejos. {m} lo busca en la cocina pero no está allí. Lo busca debajo del sofá pero tampoco. Al final, {m} encuentra el balón debajo de una silla. ¡Qué alegría! {m} mueve la cola y ladra mucho.",pregunta:"¿Dónde encuentra {m} el balón?",opciones:["En la cocina","Debajo del sofá","Debajo de una silla"],correcta:2},
  {id:"t08",n:4,titulo:"{m} no quiere la ducha",texto:"Hoy es día de baño para {m}. Ve la ducha y se esconde debajo de la mesa muy callado. Mamá le llama, pero {m} no quiere salir. A {m} le gusta la leche, le gusta la noche, pero la ducha no le gusta nada. Al final, mamá le enseña un trocito de chocolate. {m} sale corriendo y se deja bañar con paciencia.",pregunta:"¿Por qué sale {m} de su escondite?",opciones:["Por un trocito de chocolate","Porque ve un coche","Porque tiene hambre"],correcta:0},
  {id:"t09",n:4,titulo:"{m} y la noche oscura",texto:"Era una noche muy oscura en casa. {m} estaba solo en la cocina y escuchó un ruido raro. Tenía un poquito de miedo pero fue a mirar. Se acercó despacio y vio... ¡un pequeño bicho verde en el suelo! {m} no quiso hacerle daño. Lo miró un rato con curiosidad y se fue a dormir. El bicho también se fue a su casa.",pregunta:"¿Qué encuentra {m} en la cocina?",opciones:["Un ratón gris","Un pequeño bicho verde","Un gato negro"],correcta:1},
  {id:"t10",n:4,titulo:"{m} bajo la lluvia",texto:"{m} sale a pasear por la calle. De repente, empieza a llover muy fuerte. Gotas grandes caen del cielo sobre todos. {m} se mete rápido debajo de un coche para no mojarse. Espera y espera mucho rato. Al final, mamá llega con un paraguas y lo lleva a casa. En casa, lo seca con una toalla suave.",pregunta:"¿Dónde se esconde {m} de la lluvia?",opciones:["Debajo de un árbol","Debajo de un coche","Debajo de una mesa"],correcta:1},
  {id:"t11",n:5,titulo:"{m} y la bruja buena",texto:"Una tarde, {m} entró en un bosque muy frondoso lleno de plantas. Allí vivía una bruja con el pelo gris y una capa negra muy grande. Pero no era una bruja mala, era muy buena con los animales. Cuando vio a {m}, le ofreció una fresa roja y una flor preciosa. {m} comió la fresa y sintió mucha paz en el bosque. La bruja se despidió de él con una sonrisa. {m} volvió a casa contento.",pregunta:"¿Qué le regala la bruja a {m}?",opciones:["Una fresa y una flor","Un libro y un plato","Un globo y un trapo"],correcta:0},
  {id:"t12",n:5,titulo:"{m} encuentra una fresa",texto:"{m} estaba en el prado buscando algo rico para comer. De pronto vio una fresa enorme entre las plantas de trigo. Se acercó despacio y la olió con cuidado. ¡Olía muy bien! Pero cuando iba a comérsela, una cabra blanca con cuernos apareció. La cabra también quería la fresa. {m} fue muy amable y partió la fresa en dos trozos iguales. Los dos se sentaron juntos a comer entre el trigo.",pregunta:"¿Qué hace {m} con la fresa?",opciones:["Se la come entero él solo","La parte en dos con la cabra","La guarda para otro día"],correcta:1},
  {id:"t13",n:5,titulo:"{m} en el prado",texto:"Hoy {m} fue al prado con toda la familia en una mañana preciosa. En el prado había muchas flores y mariposas blancas volando. {m} corría entre el trigo mientras el sol brillaba en el cielo claro. Vio un globo rojo que subía muy alto, cada vez más lejos. También vio una presa con agua cristalina y un grifo de agua fresca. Al final del día, {m} estaba cansado pero muy feliz. Se durmió en la hierba soñando con aventuras.",pregunta:"¿Qué ve {m} subir por el cielo?",opciones:["Un pájaro pequeño","Un globo rojo","Una mariposa blanca"],correcta:1},
  {id:"t14",n:6,titulo:"{m} es papá",texto:"Ha pasado mucho tiempo desde que {m} llegó en aquella caja. Ahora {m} ya es mayor y tiene un cachorrito propio. El bebé se parece mucho a {m} cuando era pequeño: fluffy, peludo y con ojos muy grandes. {m} le enseña todo lo que sabe sobre la vida: cómo buscar la pelota, cómo dormir tranquilito por la noche y cómo saludar con cariño a las personas. El cachorrito sigue a {m} a todas partes moviendo la cola sin parar. Al final del día, los dos se acurrucan juntos en la cama. {m} es muy feliz de ser papá.",pregunta:"¿Qué le enseña {m} a su cachorrito?",opciones:["Cómo buscar la pelota","Cómo leer libros gruesos","Cómo ir al colegio"],correcta:0},
  {id:"t15",n:6,titulo:"El cumpleaños de {m}",texto:"Hoy es un día muy especial en casa: ¡es el cumpleaños de {m}! La familia le ha preparado una fiesta con muchos globos de colores y un pastel enorme con fresas encima. {m} lleva un sombrero de fiesta en la cabeza y una corona amarilla brillante. Todos sus amigos perrunos han venido a celebrarlo: el zorro juguetón, el caballo grande y hasta la gallina pequeña del jardín. Juegan toda la tarde en el prado y comen mucho chocolate. Cuando llega el momento, {m} sopla las velas del pastel y pide un deseo en silencio. Solo {m} sabe lo que ha pedido.",pregunta:"¿Qué lleva {m} en su cumpleaños?",opciones:["Un sombrero de fiesta y una corona","Un pantalón y un chaleco","Una mochila y un paraguas"],correcta:0}
];

function loadState() {

  } catch (e) {

  }
}

function saveState() {

// Umbrales de XP para cada fase de crecimiento
// Cada sesión da ~10 XP. Con esto el abuelo llega a ~60+ sesiones.
const XP_THRESHOLDS = [0, 30, 100, 250, 500, 900]; // fase 0..5
const XP_MAX_DISPLAY = XP_THRESHOLDS[XP_THRESHOLDS.length - 1]; // tope para la barra visual

function mascotPhase() {
  const xp = state.xp;
  for (let i = XP_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= XP_THRESHOLDS[i]) return i;
  }
  return 0;
}

function mascotNextMilestone() {
  const xp = state.xp;
  for (let i = 0; i < XP_THRESHOLDS.length; i++) {
    if (xp < XP_THRESHOLDS[i]) return XP_THRESHOLDS[i];
  }
  return XP_MAX_DISPLAY; // ya al máximo visual, pero XP sigue subiendo
}

function updateMascotAll() {
  const svg = MASCOTA_SVG[mascotPhase()];
  const homeEl = document.getElementById("mascot-home");
  const miniEl = document.getElementById("mascot-mini");
  const endEl = document.getElementById("mascot-end");
  const hubEl = document.getElementById("mascot-hub");
  if (homeEl) homeEl.innerHTML = svg;
  if (miniEl) miniEl.innerHTML = svg;
  if (endEl) endEl.innerHTML = svg;
  if (hubEl) hubEl.innerHTML = svg;
  // Barra XP
  const phase = mascotPhase();
  const thisTh = XP_THRESHOLDS[phase];
  const nextTh = XP_THRESHOLDS[phase + 1] || (state.xp + 100);
  const segmentPct = Math.min(100, ((state.xp - thisTh) / (nextTh - thisTh)) * 100);
  const xpFill = document.getElementById("xp-fill");
  const xpFillEnd = document.getElementById("xp-fill-end");
  const xpFillHub = document.getElementById("xp-fill-hub");
  if (xpFill) xpFill.style.width = segmentPct + "%";
  if (xpFillEnd) xpFillEnd.style.width = segmentPct + "%";
  if (xpFillHub) xpFillHub.style.width = segmentPct + "%";
  const nameEl = document.getElementById("mascot-name");
  const greetEl = document.getElementById("greeting-name");
  const hubNameEl = document.getElementById("hub-name");
  if (nameEl) nameEl.textContent = state.mascotName;
  if (greetEl) greetEl.textContent = state.name;
  if (hubNameEl) hubNameEl.textContent = state.name;
}

   ========================================================================== */

function updateLevel(exerciseType, correct) {
  // Seleccionar historial y nivel según módulo activo
  const isLetras = state.currentModule === "letras";
  const histKey = isLetras ? "historialLetras" : "historialNums";
  const nivelKey = isLetras ? "nivelLetras" : "nivelNums";

  if (!state[histKey][exerciseType]) state[histKey][exerciseType] = [];
  state[histKey][exerciseType].push(correct ? 1 : 0);
  if (state[histKey][exerciseType].length > 10) {
    state[histKey][exerciseType].shift();
  }
  // Agregado del historial del módulo
  const all = [];
  Object.keys(state[histKey]).forEach(k => all.push(...(state[histKey][k] || [])));
  if (all.length >= 10) {
    const avg = all.reduce((s, v) => s + v, 0) / all.length;
    if (avg >= 0.8 && state[nivelKey] < 6) {
      state[nivelKey]++;
      // reset del historial de ese módulo
      Object.keys(state[histKey]).forEach(k => state[histKey][k] = []);
    } else if (avg < 0.5 && state[nivelKey] > 1) {
      state[nivelKey]--;
      Object.keys(state[histKey]).forEach(k => state[histKey][k] = []);
    }
  }
}

function currentNivel() {
  return state.currentModule === "letras" ? state.nivelLetras : state.nivelNums;
}

function markRecent(type, id) {
  const arr = state.recientes[type];
  arr.push(id);
  if (arr.length > 30) arr.shift();
}

function pickPalabra() {
  const candidatas = PALABRAS.filter(p => p.n === currentNivel());
  const noVistas = candidatas.filter(p => !state.recientes.palabras.includes(p.p));
  const pool = noVistas.length > 0 ? noVistas : candidatas;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  markRecent("palabras", picked.p);
  return picked;
}

function pickPseudopalabra() {
  const candidatas = PSEUDOPALABRAS.filter(p => p.n === currentNivel());
  const noVistas = candidatas.filter(p => !state.recientes.pseudopalabras.includes(p.p));
  const pool = noVistas.length > 0 ? noVistas : candidatas;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  markRecent("pseudopalabras", picked.p);
  return picked;
}

function pickTexto() {
  const candidatos = TEXTOS.filter(t => t.n === currentNivel());
  const noVistos = candidatos.filter(t => !state.recientes.textos.includes(t.id));
  const pool = noVistos.length > 0 ? noVistos : candidatos;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  markRecent("textos", picked.id);
  return picked;
}

/* ==========================================================================
   AUDIO (TTS + melodía Web Audio)
   ========================================================================== */

let currentUtterance = null;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { console.warn("AudioContext no disponible", e); }
  }
  return audioCtx;
}

function playNote(freq, startOffset, duration, volume = 0.18) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.value = freq;
  const t0 = ctx.currentTime + startOffset;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(volume, t0 + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + duration);
}

function playMelodyWelcome() {
  // Pentatónica alegre tipo juguete
  const notes = [
    { f: 523.25, t: 0,    d: 0.18 }, // C5
    { f: 659.25, t: 0.14, d: 0.18 }, // E5
    { f: 783.99, t: 0.28, d: 0.18 }, // G5
    { f: 1046.5, t: 0.42, d: 0.30 }  // C6
  ];
  notes.forEach(n => playNote(n.f, n.t, n.d));
}

function playMelodySuccess() {
  const notes = [
    { f: 659.25, t: 0,    d: 0.12 },
    { f: 783.99, t: 0.10, d: 0.12 },
    { f: 1046.5, t: 0.20, d: 0.22 }
  ];
  notes.forEach(n => playNote(n.f, n.t, n.d, 0.14));
}

function speak(text, onEnd) {
  try {
    if (currentUtterance) speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "es-ES";
    u.rate = 0.82;
    u.pitch = 1.0;
    if (onEnd) u.onend = onEnd;
    currentUtterance = u;
    speechSynthesis.speak(u);
  } catch (e) { console.warn("TTS no disponible", e); if (onEnd) onEnd(); }
}

let sessionExercises = [];
let sessionIndex = 0;
let sessionCorrect = 0;
let sessionXpGained = 0;

// Rotación letras: cubre discrim, léxica, omisión en 3 sesiones
const ROTACION_SLOTS_LETRAS = [
  ["discrim", "lexica"],
  ["omision", "discrim"],
  ["lexica", "omision"]
];

// Rotación números: 6 ejercicios. Mezcla de 5 tipos (contar, grupos/multi, tablas, valor posicional, comparar, suma)
// La multiplicación visual es el eje central; tablas aparecen una vez por sesión.
const ROTACION_SLOTS_NUMS = [
  ["contar", "multiplicacion", "tablas", "valorpos", "comparar", "suma"],
  ["contar", "tablas", "comparar", "multiplicacion", "suma", "valorpos"],
  ["suma", "contar", "multiplicacion", "tablas", "valorpos", "comparar"]
];

function buildSession() {
  if (state.currentModule === "numeros") {
    const totalSes = state.totalSessionsNums || 0;
    return [...ROTACION_SLOTS_NUMS[totalSes % 3]];
  }
  // letras (por defecto)
  const totalSes = state.totalSessionsLetras || 0;
  const [s1, s2] = ROTACION_SLOTS_LETRAS[totalSes % 3];
  return ["dictado", s1, s2, "dictado", "comprension"];
}

function startSession() {
  sessionExercises = buildSession();
  sessionIndex = 0;
  sessionCorrect = 0;
  sessionXpGained = 0;
  renderProgressDots();
  goScreen("session");
  nextExercise();
}

function renderProgressDots() {
  const container = document.getElementById("progress-dots");
  container.innerHTML = "";
  sessionExercises.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "progress-dot";
    if (i < sessionIndex) dot.classList.add("done");
    if (i === sessionIndex) dot.classList.add("active");
    container.appendChild(dot);
  });
}

function nextExercise() {
  if (sessionIndex >= sessionExercises.length) {
    endSession();
    return;
  }
  renderProgressDots();
  const type = sessionExercises[sessionIndex];
  // Letras
  if (type === "dictado") renderDictado();
  else if (type === "lexica") renderLexica();
  else if (type === "comprension") renderComprension();
  else if (type === "discrim") renderDiscrim();
  else if (type === "omision") renderOmision();
  // Números
  else if (type === "contar") renderContar();
  else if (type === "multiplicacion") renderMultiplicacion();
  else if (type === "tablas") renderTablas();
  else if (type === "valorpos") renderValorPosicional();
  else if (type === "comparar") renderComparar();
  else if (type === "suma") renderSuma();
}

function showFeedback(correct, callback) {
  const fb = document.getElementById("feedback");
  const emoji = document.getElementById("feedback-emoji");
  const text = document.getElementById("feedback-text");
  if (correct) {
    const positives = ["⭐", "🌟", "✨", "🎉", "💫"];
    const msgs = ["¡Muy bien!", "¡Genial!", "¡Fantástico!", "¡Súper!", "¡Bravo!"];
    emoji.textContent = positives[Math.floor(Math.random() * positives.length)];
    text.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  } else {
    emoji.textContent = "💛";
    text.textContent = "¡Casi! Sigue así.";
  }
  fb.classList.add("show");
  setTimeout(() => {
    fb.classList.remove("show");
    callback();
  }, 1500);
}

function finishExercise(type, correct) {
  if (correct) {
    sessionCorrect++;
    sessionXpGained += 2;
    state.xp += 2;
  } else {
    sessionXpGained += 1;
    state.xp += 1; // participar siempre suma, aunque menos
  }
  updateLevel(type, correct);
  saveState();
  showFeedback(correct, () => {
    sessionIndex++;
    nextExercise();
  });
}

let dictadoBuilt = [];
let dictadoErrores = 0;

// Frases que introducen la palabra con contexto Fluffy (neutras de género)
function fluffyIntro() {
  const fluffy = state.mascotName || "Fluffy";
  const intros = [
    `Mira lo que ${fluffy} ha encontrado:`,
    `${fluffy} te enseña esto:`,
    `${fluffy} quiere escribir:`,
    `¡Ayuda a ${fluffy} a escribirlo!`,
    `${fluffy} dice... ¿qué es?`,
    `${fluffy} descubrió esto hoy:`,
    `${fluffy} te lo muestra:`,
    `${fluffy} señala:`
  ];
  return intros[Math.floor(Math.random() * intros.length)];
}

function renderDictado() {
  const palabra = pickPalabra();
  // reset estado
  dictadoBuilt = [];
  dictadoErrores = 0;

  const container = document.getElementById("exercise-container");

  // Mezclar las sílabas
  const silabasMezcladas = [...palabra.s].sort(() => Math.random() - 0.5);
  // asegurarnos que no queden en orden correcto
  if (palabra.s.length > 1 && silabasMezcladas.join() === palabra.s.join()) {
    [silabasMezcladas[0], silabasMezcladas[1]] = [silabasMezcladas[1], silabasMezcladas[0]];
  }

  container.innerHTML = `
    <div class="fluffy-intro">${fluffyIntro()}</div>
    <div class="dictado-emoji">${palabra.e}</div>
    <button class="sound-btn" id="sound-btn" aria-label="Escuchar palabra">🔊</button>
    <div class="hint">Ordena las sílabas</div>
    <div class="syllables-built" id="syllables-built"></div>
    <div class="syllables-pool" id="syllables-pool"></div>
  `;

  const pool = document.getElementById("syllables-pool");
  silabasMezcladas.forEach((sil, i) => {
    const b = document.createElement("button");
    b.className = "btn btn-syllable";
    b.textContent = sil;
    b.dataset.silaba = sil;
    b.dataset.idx = i;
    b.onclick = () => handleSilabaClick(b, palabra);
    pool.appendChild(b);
  });

  document.getElementById("sound-btn").onclick = () => playSound(palabra.p);
  setTimeout(() => playSound(palabra.p), 400);
}

function playSound(word) {
  const btn = document.getElementById("sound-btn");
  if (btn) btn.classList.add("playing");
  speak(word, () => { if (btn) btn.classList.remove("playing"); });
}

let dictadoBuilt_declarado = true; // solo marcador

function handleSilabaClick(btn, palabra) {
  const sil = btn.dataset.silaba;
  const expected = palabra.s[dictadoBuilt.length];
  if (sil === expected) {
    dictadoBuilt.push(sil);
    btn.classList.add("used");
    btn.disabled = true;
    const builtBox = document.getElementById("syllables-built");
    const span = document.createElement("span");
    span.textContent = sil;
    builtBox.appendChild(span);
    // ¿completado?
    if (dictadoBuilt.length === palabra.s.length) {
      // acierto si 0-1 errores (margen de dislexia)
      const correct = dictadoErrores <= 1;
      setTimeout(() => {
        dictadoBuilt = [];
        dictadoErrores = 0;
        finishExercise("dictado", correct);
      }, 600);
    }
  } else {
    dictadoErrores++;
    btn.classList.add("tap-err");
    setTimeout(() => btn.classList.remove("tap-err"), 400);
    // Después de 3 errores en la misma palabra, ayudamos: marcamos la correcta sutilmente
    if (dictadoErrores >= 3) {
      const pool = document.getElementById("syllables-pool");
      [...pool.children].forEach(b => {
        if (b.dataset.silaba === expected && !b.disabled) {
          b.style.boxShadow = "0 0 0 4px var(--sun)";
        }
      });
    }
  }
}

/* ---------- DISCRIMINACIÓN VISUAL (letras/símbolos diferentes) ---------- */

// Pares problemáticos: [letra_base, letra_diferente]
// Los pares se eligen según nivel para progresar en dificultad
const DISCRIM_PARES = {
  1: [["b","d"],["d","b"],["p","q"],["q","p"],["u","n"]],
  2: [["b","d"],["d","b"],["p","q"],["q","p"],["m","n"],["n","m"],["u","n"]],
  3: [["b","d"],["p","q"],["m","n"],["n","u"],["a","o"],["o","a"],["c","e"]],
  4: [["b","d"],["p","q"],["a","o"],["c","e"],["l","i"],["i","l"],["r","n"]],
  5: [["ba","da"],["pa","qa"],["bo","do"],["po","qo"],["da","ba"],["qu","gu"]],
  6: [["ban","dan"],["pol","qol"],["dar","bar"],["mar","nar"],["pro","bro"]]
};

function renderDiscrim() {
  const nivel = currentNivel();
  const pares = DISCRIM_PARES[nivel] || DISCRIM_PARES[1];
  const par = pares[Math.floor(Math.random() * pares.length)];
  const base = par[0];
  const distinta = par[1];

  // Tamaño del grid según nivel
  const gridSizes = {1:{c:3,r:3}, 2:{c:4,r:3}, 3:{c:5,r:4}, 4:{c:6,r:4}, 5:{c:6,r:5}, 6:{c:7,r:5}};
  const size = gridSizes[nivel] || gridSizes[1];
  const total = size.c * size.r;
  const posDistinta = Math.floor(Math.random() * total);

  const container = document.getElementById("exercise-container");
  const fluffy = state.mascotName || "Fluffy";
  container.innerHTML = `
    <div class="fluffy-intro">${fluffy} dice: encuentra la diferente</div>
    <div class="hint">Una es distinta. ¿Cuál es?</div>
    <div class="discrim-grid" id="discrim-grid" style="grid-template-columns: repeat(${size.c}, 1fr);"></div>
  `;

  const grid = document.getElementById("discrim-grid");
  let discriErrors = 0;
  for (let i = 0; i < total; i++) {
    const cell = document.createElement("button");
    cell.className = "discrim-cell";
    const esDistinta = i === posDistinta;
    cell.textContent = esDistinta ? distinta : base;
    cell.onclick = () => {
      if (esDistinta) {
        cell.classList.add("found");
        // deshabilitar todas
        [...grid.children].forEach(c => c.disabled = true);
        setTimeout(() => finishExercise("discrim", discriErrors <= 1), 700);
      } else {
        discriErrors++;
        cell.classList.add("tap-err");
        setTimeout(() => cell.classList.remove("tap-err"), 400);
      }
    };
    grid.appendChild(cell);
  }
}

/* ---------- OMISIÓN DE SÍLABA ---------- */

function pickSilabaAQuitar(palabra) {
  const n = palabra.s.length;
  if (n === 1) return 0;
  if (n === 2) return Math.floor(Math.random() * 2);
  if (n === 3) return 1; // la del medio es la más desafiante cognitivamente
  // 4+ sílabas: elige del medio (no la primera ni la última)
  return 1 + Math.floor(Math.random() * (n - 2));
}

function computeResultado(palabra, idxRemove) {
  return palabra.s.filter((_, i) => i !== idxRemove).join("");
}

function renderOmision() {
  // Elegir palabra con al menos 2 sílabas
  let palabra = pickPalabra();
  let tries = 0;
  while (palabra.s.length < 2 && tries < 8) {
    palabra = pickPalabra();
    tries++;
  }
  if (palabra.s.length < 2) {
    finishExercise("omision", true);
    return;
  }

  const idxRemove = pickSilabaAQuitar(palabra);
  const silabaQuitar = palabra.s[idxRemove];
  const resultado = computeResultado(palabra, idxRemove);

  const container = document.getElementById("exercise-container");
  const fluffy = state.mascotName || "Fluffy";
  container.innerHTML = `
    <div class="fluffy-intro">${fluffy} te reta</div>
    <div class="omision-question">
      Tengo <strong>${palabra.p}</strong><br>
      Quiero decir <strong>${resultado}</strong><br>
      <span style="font-size:1.1rem;color:var(--soft-ink);font-weight:400;">¿Qué sílaba sobra?</span>
    </div>
    <button class="sound-btn" id="sound-btn" aria-label="Escuchar">🔊</button>
    <div class="omision-silabas" id="omision-silabas"></div>
  `;

  const box = document.getElementById("omision-silabas");
  let errores = 0;
  palabra.s.forEach((sil, i) => {
    const btn = document.createElement("button");
    btn.className = "btn btn-syllable";
    btn.textContent = sil;
    btn.onclick = () => {
      if (i === idxRemove) {
        btn.classList.add("removed");
        [...box.children].forEach(c => c.disabled = true);
        // TTS lee palabra original y resultado como refuerzo
        setTimeout(() => speak(`${palabra.p}, sin ${silabaQuitar}, es ${resultado}`), 500);
        setTimeout(() => finishExercise("omision", errores <= 1), 2600);
      } else {
        errores++;
        btn.classList.add("tap-err");
        setTimeout(() => btn.classList.remove("tap-err"), 400);
      }
    };
    box.appendChild(btn);
  });

  // TTS inicial: dice palabra y resultado
  const sayInstruction = () => speak(`${palabra.p}. Quiero decir ${resultado}. ¿Qué sobra?`);
  document.getElementById("sound-btn").onclick = sayInstruction;
  setTimeout(sayInstruction, 500);
}

/* ---------- DECISIÓN LÉXICA ---------- */

// Emojis "perrunos" para contar (coherente con Fluffy)
const NUM_ITEMS = ["🦴", "🍖", "🍪", "🐾", "⭐", "🎾", "🫧", "🍗"];

function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function rangoPorNivel(nivel) {
  // Rangos para operaciones según nivel
  if (nivel === 1) return { max: 5 };
  if (nivel === 2) return { max: 10 };
  if (nivel === 3) return { max: 20 };
  if (nivel === 4) return { max: 50 };
  if (nivel === 5) return { max: 100 };
  return { max: 200 };
}

function generarOpcionesNum(correcta, cantidad = 3, maxDesvio = 3) {
  // Genera opciones únicas: la correcta + distractores cercanos
  // Distractores siempre positivos, distintos entre sí y de la correcta
  const opts = new Set([correcta]);
  // Primero intenta desvíos simétricos (tanto arriba como abajo)
  const candidatos = [];
  for (let d = 1; d <= maxDesvio + 3; d++) {
    if (correcta - d >= 0) candidatos.push(correcta - d);
    candidatos.push(correcta + d);
  }
  // Mezcla los candidatos para variar orden
  candidatos.sort(() => Math.random() - 0.5);
  for (const c of candidatos) {
    if (opts.size >= cantidad) break;
    if (c !== correcta && c >= 0) opts.add(c);
  }
  // Fallback: si aún faltan, añadir números mayores que no colisionen
  let fill = Math.max(correcta, 0) + maxDesvio + 1;
  while (opts.size < cantidad) {
    if (!opts.has(fill)) opts.add(fill);
    fill++;
  }
  return [...opts].sort(() => Math.random() - 0.5);
}

/* ---------- 3. TABLAS DE MULTIPLICAR ---------- */
function renderTablas() {
  const nivel = currentNivel();
  // Selección de tablas según nivel, pero todas disponibles
  // N1: solo 2, 5, 10. N2: 2,3,5,10. N3+: todas hasta 10.
  let tablasDisponibles;
  if (nivel === 1) tablasDisponibles = [2, 5, 10];
  else if (nivel === 2) tablasDisponibles = [2, 3, 4, 5, 10];
  else if (nivel === 3) tablasDisponibles = [2, 3, 4, 5, 6, 10];
  else tablasDisponibles = [2, 3, 4, 5, 6, 7, 8, 9, 10];
  const tabla = randChoice(tablasDisponibles);
  const mult = 1 + Math.floor(Math.random() * 10);
  const resultado = tabla * mult;

  const container = document.getElementById("exercise-container");
  const fluffy = state.mascotName || "Fluffy";
  container.innerHTML = `
    <div class="fluffy-intro">${fluffy} multiplica</div>
    <div class="num-question"><strong>${tabla} × ${mult}</strong> = ?</div>
    <div class="num-opciones" id="num-opciones"></div>
  `;
  // Distractores: múltiplos cercanos de la misma tabla, sin duplicados ni negativos
  const distractoresCand = new Set();
  [
    tabla * (mult - 1),
    tabla * (mult + 1),
    tabla * mult + tabla - 1,
    tabla * mult - 1,
    tabla * mult + 1,
    tabla * (mult + 2)
  ].forEach(d => {
    if (d > 0 && d !== resultado) distractoresCand.add(d);
  });
  const distArr = [...distractoresCand].sort(() => Math.random() - 0.5);
  const opsSet = new Set([resultado]);
  for (const d of distArr) {
    if (opsSet.size >= 3) break;
    opsSet.add(d);
  }
  // Fallback si acabamos con <3
  let fill = resultado + 1;
  while (opsSet.size < 3) { if (!opsSet.has(fill)) opsSet.add(fill); fill++; }
  const opsFinal = [...opsSet].sort(() => Math.random() - 0.5);
  setTimeout(() => speak(`${tabla} por ${mult}`), 400);
  const opsCont = document.getElementById("num-opciones");
  opsFinal.forEach(op => {
    const b = document.createElement("button");
    b.className = "num-opcion";
    b.textContent = op;
    b.onclick = () => {
      const correct = op === resultado;
      b.classList.add(correct ? "correct" : "incorrect");
      if (!correct) {
        [...opsCont.children].forEach(c => {
          if (parseInt(c.textContent) === resultado) c.classList.add("correct");
        });
      }
      [...opsCont.children].forEach(c => c.disabled = true);
      if (correct) setTimeout(() => speak(`${tabla} por ${mult} es ${resultado}`), 200);
      setTimeout(() => finishExercise("tablas", correct), 1800);
    };
    opsCont.appendChild(b);
  });
}

function renderValorPosicional() {

  let numero;
  if (nivel === 1) numero = 1 + Math.floor(Math.random() * 9);

  else if (nivel === 3) numero = 10 + Math.floor(Math.random() * 90);
  else numero = 20 + Math.floor(Math.random() * 80);

  const decenas = Math.floor(numero / 10);
  const unidades = numero % 10;

  const container = document.getElementById("exercise-container");
  const fluffy = state.mascotName || "Fluffy";
  container.innerHTML = `
    <div class="fluffy-intro">${fluffy} construye números</div>

    f.className = "num-ficha";
    uniCont.appendChild(f);
  }
  // Distractores: invertir dígitos (error típico), ±1, ±10, sin duplicar
  const distrSet = new Set([numero]);
  if (decenas > 0 && unidades > 0 && decenas !== unidades) {

  });
  const distArr = [...distrSet];
  // Quitamos la correcta del array de candidatos para mezclar distractores
  const soloDist = distArr.filter(x => x !== numero).sort(() => Math.random() - 0.5);
  const opsSet = new Set([numero]);

  while (opsSet.size < 3) { if (!opsSet.has(fill)) opsSet.add(fill); fill++; }

  setTimeout(() => {
    if (decenas > 0) speak(`${decenas} decenas y ${unidades} unidades. ¿Qué número es?`);

          if (parseInt(c.textContent) === numero) c.classList.add("correct");
        });
      }
      [...opsCont.children].forEach(c => c.disabled = true);
      if (correct) setTimeout(() => speak(`${numero}`), 200);
      setTimeout(() => finishExercise("valorpos", correct), 1800);
    };
    opsCont.appendChild(b);
  });
}

    ${mostrarVisual ? `
    <div class="num-comparacion">
      <div class="num-caja" id="caja-a"></div>
      <div style="font-size:2rem;font-weight:800;color:var(--coral);">+</div>
      <div class="num-caja" id="caja-b"></div>
    </div>` : ''}
    <div class="num-opciones" id="num-opciones"></div>
  `;
  if (mostrarVisual) {
    const cajaA = document.getElementById("caja-a");
    const cajaB = document.getElementById("caja-b");
    for (let i = 0; i < a; i++) {
      const sp = document.createElement("span"); sp.className = "num-item"; sp.textContent = emoji; cajaA.appendChild(sp);
    }
    for (let i = 0; i < b; i++) {
      const sp = document.createElement("span"); sp.className = "num-item"; sp.textContent = emoji; cajaB.appendChild(sp);
    }
  }
  setTimeout(() => speak(`${a} más ${b}`), 400);
  const ops = generarOpcionesNum(total, 3, Math.max(2, Math.ceil(total / 6)));
  const opsCont = document.getElementById("num-opciones");
  ops.forEach(op => {
    const b2 = document.createElement("button");
    b2.className = "num-opcion";
    b2.textContent = op;
    b2.onclick = () => {
      const correct = op === total;
      b2.classList.add(correct ? "correct" : "incorrect");
      if (!correct) {
        [...opsCont.children].forEach(c => {
          if (parseInt(c.textContent) === total) c.classList.add("correct");
        });
      }
      [...opsCont.children].forEach(c => c.disabled = true);
      if (correct) setTimeout(() => speak(`${a} más ${b} es ${total}`), 200);
      setTimeout(() => finishExercise("suma", correct), 1800);
    };
    opsCont.appendChild(b2);
  });
}

/* ==========================================================================
   HUB: entrar a un módulo
   ========================================================================== */

function enterModule(mod) {
  state.currentModule = mod;
  saveState();
  startSession();
}

function goHub() {
  const m = document.getElementById("mascot-hub");
  if (m) m.innerHTML = MASCOTA_SVG[mascotPhase()];
  const n = document.getElementById("hub-name");
  if (n) n.textContent = state.name;
  updateMascotAll();
  goScreen("hub");
}

/* ==========================================================================
   ONBOARDING (primera vez)
   ========================================================================== */

const NOMBRES_SUGERIDOS = ["Fluffy", "Toby", "Luna", "Coco", "Nube", "Pipo"];

function initOnboarding() {
  const boxEl = document.getElementById("box-container");
  if (boxEl) boxEl.innerHTML = MASCOTA_CAJA;

  const chips = document.getElementById("name-chips");
  const input = document.getElementById("name-input");
  const btn = document.getElementById("btn-onboard-go");

  // Limpiar chips
  chips.innerHTML = "";
  NOMBRES_SUGERIDOS.forEach(nombre => {
    const chip = document.createElement("button");
    chip.className = "name-chip";
    chip.textContent = nombre;
    chip.onclick = () => {
      input.value = nombre;
      input.focus();
    };
    chips.appendChild(chip);
  });

  // Habilitar/deshabilitar botón según input
  function updateBtn() {
    const val = input.value.trim();
    btn.disabled = val.length < 1;
    btn.style.opacity = val.length < 1 ? "0.4" : "1";
  }
  input.addEventListener("input", updateBtn);
  updateBtn();

  btn.onclick = () => {
    const val = input.value.trim() || "Fluffy";
    state.mascotName = val;
    saveState();
    // Melodía + voz de bienvenida personalizada
    try { getAudioCtx(); playMelodyWelcome(); } catch(e) {}
    setTimeout(() => {
      speak(`¡Hola! Tu perrito se llama ${val}. ¡A jugar!`);
    }, 800);
    goHub();
  };
}

/* ==========================================================================
   VOZ DE BIENVENIDA AL ARRANQUE
   ========================================================================== */

function playWelcomeSequence() {
  try { getAudioCtx(); playMelodyWelcome(); } catch(e) {}
  setTimeout(() => {
    const mascot = state.mascotName || "tu perrito";
    speak(`¡Hola ${state.name}! ${mascot} quiere jugar contigo.`);
  }, 900);
}

/* ==========================================================================
   NAVEGACIÓN
   ========================================================================== */

function goScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
  if (name === "home" || name === "end") updateMascotAll();
}

function goHome() { goHub(); }
function playAgain() { startSession(); }

/* ==========================================================================
   INIT
   ========================================================================== */

// Priming para voces TTS y AudioContext en iOS (necesita un gesto de usuario)
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    speechSynthesis.getVoices();
    const ctx = getAudioCtx();
    if (ctx && ctx.state === "suspended") ctx.resume();
    // Utterance vacía para desbloquear TTS en iOS
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    speechSynthesis.speak(u);
  } catch (e) { console.warn("unlockAudio", e); }
}

document.addEventListener("touchstart", unlockAudio, { once: true });
document.addEventListener("click", unlockAudio, { once: true });

// Bloquear zoom por doble tap
let lastTouch = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - lastTouch < 350) e.preventDefault();
  lastTouch = now;
}, { passive: false });

// Arranque: si no hay mascotName, mostrar onboarding; si hay, ir directo a home
function bootApp() {
  updateMascotAll();
  if (!state.mascotName || state.mascotName.length === 0) {
    initOnboarding();
    goScreen("onboard");
  } else {
    goHub();
    const hubClickOnce = () => {
      playWelcomeSequence();
      document.getElementById("screen-hub").removeEventListener("click", hubClickOnce, true);
    };
    setTimeout(() => {
      const hub = document.getElementById("screen-hub");
      if (hub) hub.addEventListener("click", hubClickOnce, { capture: true, once: true });
    }, 100);
  }
}

bootApp();
</script>
